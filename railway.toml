[build]
builder = "nixpacks"
# The CAP agent runs TypeScript directly via tsx, no Next.js build needed here.
# The frontend deploys to Vercel, not Railway.
buildCommand = "echo agent service needs no build step"

[deploy]
startCommand = "npm run agent:start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
